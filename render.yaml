services:
  - type: web
    name: farm-guardians-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: DATA_GENERATION_INTERVAL
        value: "30"
      - key: SELF_PING_ENABLED
        value: "true"
      - key: SELF_PING_INTERVAL_MINUTES
        value: "10"
      - key: SELF_PING_URL
        value: https://farm-guardians-backend.onrender.com/health
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
